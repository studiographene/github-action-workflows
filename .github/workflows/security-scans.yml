name: Security scans

on:
  workflow_call:
    inputs:
      job_runner:
        description: "GitHub action Jobs runtime. For example GitHub default runtimes like ubuntu-latest or you custome runtime. Default = ubuntu-latest"
        type: string
        required: false
        default: "ubuntu-latest"
      excluded_jobs:
        type: string
        default: ""
      semgrep_options:
        type: string
        default: ""
      security_scan_before_step_command:
        type: string
        default: ""
      security_scan_after_step_command:
        type: string
        default: ""

jobs:
  SAST:
    name: sast
    runs-on: ${{ inputs.job_runner }}
    permissions:
      contents: read
      issues: write
      discussions: write
      pull-requests: write
      security-events: write
    if: ${{ !(contains(fromJSON('["github-actions[bot]", "dependabot[bot]"]'), github.actor)) && (github.event_name != 'issue_comment') && !contains(inputs.excluded_jobs, 'sast') }}
    container:
      image: public.ecr.aws/studiographene/ci:node-22-alpine
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: SAST before step
        if: ${{ inputs.security_scan_before_step_command != '' }}
        run: |
          ${{ inputs.security_scan_before_step_command}}
      - name: SAST Scan using Semgrep
        id: generate_sast_report
        run: |
          set +e
          cp /root/configs/semgrep/rules/eslint.v1.3.32.yml eslint.v1.3.32.yml
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          semgrep scan --error --config  "p/default" --config eslint.v1.3.32.yml --json ${{ inputs.semgrep_options }}  > semgrep.json
          SEMGREP_EXIT_CODE=$?
          set -e
          if [ $SEMGREP_EXIT_CODE -ne 0 ]; then
            echo "## Semgrep SAST Scan Report" > sast_report.md
            echo "### Below are the vulnerabilities found in the code. Please resolve these before merging the pull request: " >> sast_report.md
            echo "| Rule Id | Severity |  Message | Line Number | File Name |" >> sast_report.md
            echo "| --- | --- | --- | --- | --- |" >> sast_report.md
            echo 'const fs = require("fs");
            const semgrepFile = fs.readFileSync("semgrep.json", "utf8");
            const semgrepData = JSON.parse(semgrepFile);
            for (const result of semgrepData.results) {
              let ruleId = result.check_id.replaceAll(",",";");
              ruleId = ruleId.replaceAll("\n","");
              let message = result.extra.message.replaceAll(",", ";");
              message = message.replaceAll("\n","");
              const severity = result.extra.severity;
              const lineNumber = result.start.line;
              const fileName = result.path;
              console.log("| " + ruleId + " | "  + severity + "|" + message +" | " + lineNumber + " | " + fileName + " |");
            }' > sast_report_format.cjs
            node sast_report_format.cjs >> sast_report.md
          else
            echo "## Semgrep SAST Scan Report" > sast_report.md
            echo "### :tada:! There are no vulnerabilities found in the code." >> sast_report.md
          fi
          if [ $SEMGREP_EXIT_CODE != 0 ]; then
            echo "::error::Vulnerabilities found! Find the scan report in the PR comment if this scan was triggered by PR"
            exit 1
          elif [ $SEMGREP_EXIT_CODE == 0 ]; then
            exit 0
          fi
      - name: Comment SAST report on PR
        if: ${{ !cancelled() }}
        uses: mshick/add-pr-comment@v2
        with:
          message-id: sast-scan
          message-path: sast_report.md

  gitleaks:
    name: gitleaks
    runs-on: ${{ inputs.job_runner }}
    permissions:
      contents: read
      issues: write
      discussions: write
      pull-requests: write
      security-events: write
    if: ${{ !(contains(fromJSON('["github-actions[bot]", "dependabot[bot]"]'), github.actor)) && (github.event_name != 'issue_comment') && !contains(inputs.excluded_jobs, 'gitleaks') }}
    container:
      image: public.ecr.aws/studiographene/ci:node-22-alpine
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      # - name: SAST before step
      #   if: ${{ inputs.security_scan_before_step_command != '' }}
      #   run: |
      #     ${{ inputs.security_scan_before_step_command}}

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v1.6.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  generate_sbom:
    name: generate_sbom
    runs-on: ${{ inputs.job_runner }}
    permissions:
      contents: read
      issues: write
      discussions: write
      pull-requests: write
      security-events: write
    if: ${{ !(contains(fromJSON('["github-actions[bot]", "dependabot[bot]"]'), github.actor)) && (github.event_name != 'issue_comment') && !contains(inputs.excluded_jobs, 'dependency_scan') }}
    container:
      image: public.ecr.aws/studiographene/ci:node-22-alpine
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - name: Check for composer.lock or composer.json
        id: check_files
        run: |
          if [ -f composer.lock ] || [ -f composer.json ]; then
            echo "Files exist"
            echo "SKIP_DOWNLOAD_LOCKFILE=true" >> $GITHUB_OUTPUT
          else
            echo "Files do not exist"
            echo "SKIP_DOWNLOAD_LOCKFILE=false" >> $GITHUB_OUTPUT
          fi
      - name: Download package_lockFile Artifact
        if: ${{ !cancelled() && steps.check_files.outputs.SKIP_DOWNLOAD_LOCKFILE != 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: package_lockFile
          path: .
      - name: Generate SBOM using CycloneDX
        if: always ()
        run: |
          cdxgen --version
          npm install -g @cyclonedx/cdxgen-plugins-bin
          cdxgen --deep --recurse -o bom.xml -p --debug
          ls -al
        env:
          FETCH_LICENSE: true
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CDXGEN_DEBUG_MODE: debug

      - name: Upload SBOM as artifact
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: bom.xml

  license_scan:
    name: license_scan
    runs-on: ${{ inputs.job_runner }}
    needs: generate_sbom
    permissions:
      contents: read
      issues: write
      discussions: write
      pull-requests: write
      security-events: write
    if: ${{ !(contains(fromJSON('["github-actions[bot]", "dependabot[bot]"]'), github.actor)) && (github.event_name != 'issue_comment') && !contains(inputs.excluded_jobs, 'license_scan') }}
    container:
      image: public.ecr.aws/studiographene/ci:node-22-alpine
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
      - name: Download SBOM Artifact
        uses: actions/download-artifact@v4
        with:
          name: sbom
          path: .

      - name: License Scan
        env:
          ACCESS_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.number }}
          PROJECT_NAME: ${{ github.event.repository.name }}
          PROJECT_OWNER: ${{ github.repository_owner }}
          DEFAULT_ALLOWED_LICENSES: |
            Apache-2.0
            MIT
            MIT-0
            BSD-2-Clause
            BSD-3-Clause
            ISC
            0BSD
            CC-BY-4.0
            BlueOak-1.0.0
            No-Licence
            Unlicense
            Python-2.0
            CC-BY-3.0
            CC0-1.0
            MPL-2.0
            CC-BY-4.0
            Unicode-DFS-2016
            LGPL-3.0-or-later
            ODC-By-1.0
            WTFPL
        if: ${{ !cancelled() && !contains( inputs.excluded_jobs, 'license_scan' ) }}
        run: |
          cat > allowedLicenses.txt <<EOF
              $DEFAULT_ALLOWED_LICENSES
          EOF
          cat >> allowedLicenses.txt <<EOF
              ${{ vars.ALLOWED_LICENSES }}
          EOF
          /root/executables/ci-utility check --sbom bom.xml --allowedLicences allowedLicenses.txt

  dependency_scan:
    needs: generate_sbom
    name: dependency_scan
    runs-on: ${{ inputs.job_runner }}
    permissions:
      contents: read
      issues: write
      discussions: write
      pull-requests: write
      security-events: write
    if: ${{ !(contains(fromJSON('["github-actions[bot]", "dependabot[bot]"]'), github.actor)) && (github.event_name != 'issue_comment') && !contains(inputs.excluded_jobs, 'dependency_scan') }}
    container:
      image: public.ecr.aws/studiographene/ci:node-22-alpine

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Download SBOM Artifact
        uses: actions/download-artifact@v4
        with:
          name: sbom
          path: .

      - name: Dependency Scan (SBOM + Lockfile)
        id: dependency_scan
        run: |
          set +e

          echo "📄 Preparing suppression config"
          cat >> dep_scan_suppression_config.toml <<EOF
          ${{ vars.OSV_SUPPRESSIONS }}
          EOF

          # -------------------------------
          # SBOM scan
          # -------------------------------
          echo "📦 Running SBOM scan"
          osv-scanner --format json \
            --config=./dep_scan_suppression_config.toml \
            --sbom=bom.xml > osv_sbom.json

          # -------------------------------
          # Lockfile scan (dynamic)
          # -------------------------------
          LOCK_SCAN_DONE=false

          if [ -f pnpm-lock.yaml ]; then
            echo "🔍 Found pnpm-lock.yaml"
            osv-scanner --format json --config=./dep_scan_suppression_config.toml --lockfile=pnpm-lock.yaml > osv_lock.json
            LOCK_SCAN_DONE=true

          elif [ -f package-lock.json ]; then
            echo "🔍 Found package-lock.json"
            osv-scanner --format json --config=./dep_scan_suppression_config.toml --lockfile=package-lock.json > osv_lock.json
            LOCK_SCAN_DONE=true

          elif [ -f yarn.lock ]; then
            echo "🔍 Found yarn.lock"
            osv-scanner --format json --config=./dep_scan_suppression_config.toml --lockfile=yarn.lock > osv_lock.json
            LOCK_SCAN_DONE=true

          elif [ -f composer.lock ]; then
            echo "🔍 Found composer.lock"
            osv-scanner --format json --config=./dep_scan_suppression_config.toml --lockfile=composer.lock > osv_lock.json
            LOCK_SCAN_DONE=true

          else
            echo "⚠️ No lockfile found — skipping lockfile scan"
          fi

          # -------------------------------
          # Merge results
          # -------------------------------
          if [ "$LOCK_SCAN_DONE" = true ]; then
            jq -s '{results: (.[0].results + .[1].results)}' osv_sbom.json osv_lock.json > osv_raw_report.json
          else
            cp osv_sbom.json osv_raw_report.json
          fi

          # -------------------------------
          # Generate Sorted + Deduped Markdown
          # -------------------------------
          echo "| OSV URL | Severity | Package | Version | Source |" > osv_raw_report.md
          echo "| --- | --- | --- | --- | --- |" >> osv_raw_report.md

          jq -r '
          [
            .results[].packages[] 
            | select(.vulnerabilities != null and (.vulnerabilities | length > 0))
            | . as $pkg
            | .vulnerabilities[]
            | {
                id: .id,
                severity: (.database_specific.severity // "UNKNOWN"),
                package: $pkg.package.name,
                version: ($pkg.package.version // "N/A")
              }
          ]
          | unique_by(.id + .package + .version)
          | sort_by(
              if .severity=="CRITICAL" then 0
              elif .severity=="HIGH" then 1
              elif .severity=="MODERATE" then 2
              elif .severity=="LOW" then 3
              else 4 end
            )
          | .[]
          | "| https://osv.dev/\(.id) | \(.severity) | \(.package) | \(.version) | merged |"
          ' osv_raw_report.json >> osv_raw_report.md

          # -------------------------------
          # Severity counts
          # -------------------------------
          TOTAL=$(jq '[.results[].packages[].vulnerabilities | length] | add // 0' osv_raw_report.json)

          CRITICAL=$(jq '[.results[].packages[].vulnerabilities[]? | select(.database_specific.severity=="CRITICAL")] | length' osv_raw_report.json)
          HIGH=$(jq '[.results[].packages[].vulnerabilities[]? | select(.database_specific.severity=="HIGH")] | length' osv_raw_report.json)
          MEDIUM=$(jq '[.results[].packages[].vulnerabilities[]? | select(.database_specific.severity=="MODERATE")] | length' osv_raw_report.json)
          LOW=$(jq '[.results[].packages[].vulnerabilities[]? | select(.database_specific.severity=="LOW")] | length' osv_raw_report.json)
          UNKNOWN=$(jq '[.results[].packages[].vulnerabilities[]? | select(.database_specific.severity==null)] | length' osv_raw_report.json)

          echo "critical=$CRITICAL" >> $GITHUB_OUTPUT
          echo "high=$HIGH" >> $GITHUB_OUTPUT
          echo "medium=$MEDIUM" >> $GITHUB_OUTPUT
          echo "low=$LOW" >> $GITHUB_OUTPUT
          echo "unknown=$UNKNOWN" >> $GITHUB_OUTPUT

          if [ "$TOTAL" -gt 0 ]; then
            echo "OSV_EXIT_CODE=1" >> $GITHUB_OUTPUT
          else
            echo "OSV_EXIT_CODE=0" >> $GITHUB_OUTPUT
          fi

          set -e

      - name: Generate Dependency Scan Report
        env:
          CRITICAL: ${{ steps.dependency_scan.outputs.critical }}
          HIGH: ${{ steps.dependency_scan.outputs.high }}
          MEDIUM: ${{ steps.dependency_scan.outputs.medium }}
          LOW: ${{ steps.dependency_scan.outputs.low }}
          UNKNOWN: ${{ steps.dependency_scan.outputs.unknown }}
        run: |
          echo "### The following vulnerabilities have been detected in the packages" >> osv_report.md
          echo "> CRITICAL: $CRITICAL" >> osv_report.md
          echo "HIGH: $HIGH" >> osv_report.md
          echo "MEDIUM: $MEDIUM" >> osv_report.md
          echo "LOW: $LOW" >> osv_report.md
          echo "UNKNOWN: $UNKNOWN" >> osv_report.md

          if (( CRITICAL > 0 )); then
            echo "### 🔴 CRITICAL vulnerabilities found — fix immediately<br>" >> osv_report.md
          elif (( HIGH > 0 )); then
            echo "### 🔴 HIGH vulnerabilities found<br>" >> osv_report.md
          else
            echo "### 🟡 Medium/Low vulnerabilities found<br>" >> osv_report.md
          fi

          cat osv_raw_report.md >> osv_report.md
          cat osv_report.md

          if [ "$CRITICAL" -gt 0 ]; then
            echo "::error::Critical vulnerabilities found"
            exit 1
          elif [ "$HIGH" -gt 0 ]; then
            echo "::error::High vulnerabilities found"
            exit 1
          elif [ "$MEDIUM" -gt 0 ]; then
            echo "::warning::Medium vulnerabilities found"
            exit 0
          fi

      - name: Comment Dependency scan report on PR
        if: ${{ !cancelled() }}
        uses: mshick/add-pr-comment@v2
        with:
          message-id: dependency_scan
          message-path: osv_report.md